<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NavigatorEdu — Tidewatch Guild (Demo)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      ink: '#101828', deep: '#12314f', brass: '#b98a2f', foam: '#f6f8fa'
    }}}
  };
</script>
</head>
<body class="bg-foam text-ink min-h-screen flex flex-col">

<!-- Synthetic-content banner -->
<div class="bg-deep text-white text-xs text-center py-1.5 px-3">
  Portfolio demo — all content is fictional and synthetic. Not for real-world use.
</div>

<header class="border-b border-slate-200 bg-white">
  <nav class="max-w-4xl mx-auto px-4 py-3 flex flex-wrap items-center gap-x-6 gap-y-2">
    <a href="#/" class="font-semibold text-deep tracking-tight">⚓ NavigatorEdu</a>
    <a href="#/categories" class="text-sm hover:text-brass">Categories</a>
    <a href="#/cases" class="text-sm hover:text-brass">Practice Cases</a>
    <a href="#/training" class="text-sm hover:text-brass">Training</a>
    <a href="#/quiz" class="text-sm hover:text-brass">Quiz</a>
    <a href="/docs" class="text-sm text-slate-400 hover:text-brass ml-auto">API docs</a>
  </nav>
</header>

<main id="app" class="max-w-4xl mx-auto px-4 py-8 w-full flex-1"></main>

<footer class="text-center text-xs text-slate-400 py-6">
  NavigatorEdu v0.1.0 · fictional Tidewatch Guild domain · MIT-style demo
</footer>

<script>
const api = (path) => fetch('/api/v1' + path).then(r => {
  if (!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
});

// --- Minimal markdown renderer (headers, bold, italics, lists, paragraphs) ---
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(src){
  const lines = esc(src).split('\n');
  let html = '', inList = false, inOl = false;
  const inline = t => t
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
  for (const line of lines) {
    const h = line.match(/^(#{1,3})\s+(.*)/);
    const ul = line.match(/^-\s+(.*)/);
    const ol = line.match(/^\d+\.\s+(.*)/);
    if (!ul && inList) { html += '</ul>'; inList = false; }
    if (!ol && inOl)   { html += '</ol>'; inOl = false; }
    if (h)       html += `<h${h[1].length+2} class="font-semibold text-deep mt-4 mb-1">${inline(h[2])}</h${h[1].length+2}>`;
    else if (ul) { if(!inList){html+='<ul class="list-disc ml-5 space-y-1">';inList=true;} html += `<li>${inline(ul[1])}</li>`; }
    else if (ol) { if(!inOl){html+='<ol class="list-decimal ml-5 space-y-1">';inOl=true;} html += `<li>${inline(ol[1])}</li>`; }
    else if (line.trim()) html += `<p class="my-2">${inline(line)}</p>`;
  }
  if (inList) html += '</ul>';
  if (inOl) html += '</ol>';
  return html;
}

const tagPill = t => `<span class="text-[11px] font-mono bg-slate-100 text-slate-500 rounded px-1.5 py-0.5">${t}</span>`;
const diffPill = d => `<span class="text-[11px] uppercase tracking-wide text-brass">${d}</span>`;
const card = inner => `<div class="bg-white border border-slate-200 rounded-lg p-4 hover:border-brass transition-colors">${inner}</div>`;

// ---------------- Views ----------------
const views = {

  async home() {
    const cats = await api('/categories');
    return `
      <h1 class="text-2xl font-semibold text-deep mb-1">Tidewatch Guild Reference</h1>
      <p class="text-slate-600 mb-6">A fictional celestial-navigation training library. Browse the
      reference, work practice cases, then test yourself in quiz mode.</p>
      <div class="grid sm:grid-cols-2 gap-3 mb-8">
        ${card(`<a href="#/categories" class="font-medium text-deep">📚 Reference</a><p class="text-sm text-slate-500 mt-1">Searchable items across ${cats.length} categories.</p>`)}
        ${card(`<a href="#/cases" class="font-medium text-deep">🧭 Practice cases</a><p class="text-sm text-slate-500 mt-1">Scenarios with guided reveal-as-you-go answers.</p>`)}
        ${card(`<a href="#/training" class="font-medium text-deep">🎓 Training modules</a><p class="text-sm text-slate-500 mt-1">Short conceptual lessons grouped by module.</p>`)}
        ${card(`<a href="#/quiz" class="font-medium text-deep">✅ Quiz</a><p class="text-sm text-slate-500 mt-1">Server-scored questions with explanations.</p>`)}
      </div>`;
  },

  async categories() {
    const [cats, items] = await Promise.all([api('/categories'), api('/items')]);
    const byCat = id => items.filter(i => i.category_id === id);
    return `
      <h1 class="text-xl font-semibold text-deep mb-1">Categories</h1>
      <input id="search" placeholder="Search reference items…" 
        class="w-full border border-slate-300 rounded-md px-3 py-2 my-4 text-sm bg-white focus:outline-none focus:border-brass"/>
      <div id="search-results"></div>
      <div class="space-y-6">
        ${cats.map(c => `
          <section>
            <h2 class="font-medium text-deep">${c.name}</h2>
            <p class="text-sm text-slate-500 mb-2">${c.description}</p>
            <div class="grid sm:grid-cols-2 gap-3">
              ${byCat(c.id).map(i => card(`
                <a href="#/item/${i.id}" class="font-medium text-deep">${i.title}</a>
                <p class="text-sm text-slate-500 mt-1">${i.summary}</p>
                <div class="flex gap-1.5 mt-2 items-center">${diffPill(i.difficulty)} ${i.tags.map(tagPill).join('')}</div>
              `)).join('')}
            </div>
          </section>`).join('')}
      </div>`;
  },

  async item(id) {
    const i = await api('/items/' + id);
    return `
      <a href="#/categories" class="text-sm text-slate-400 hover:text-brass">← Categories</a>
      <h1 class="text-xl font-semibold text-deep mt-2">${i.title}</h1>
      <div class="flex gap-1.5 mt-1 items-center">${diffPill(i.difficulty)} ${i.tags.map(tagPill).join('')}</div>
      <article class="mt-4 bg-white border border-slate-200 rounded-lg p-5 leading-relaxed">${md(i.body_md)}</article>`;
  },

  async cases() {
    const cs = await api('/cases');
    return `
      <h1 class="text-xl font-semibold text-deep mb-4">Practice cases</h1>
      <div class="space-y-3">
        ${cs.map(c => card(`
          <a href="#/case/${c.id}" class="font-medium text-deep">${c.title}</a>
          <span class="ml-2">${diffPill(c.difficulty)}</span>
          <p class="text-sm text-slate-500 mt-1">${c.scenario_md.slice(0, 140)}…</p>
        `)).join('')}
      </div>`;
  },

  async case(id) {
    const c = await api('/cases/' + id);
    window._case = c;
    return `
      <a href="#/cases" class="text-sm text-slate-400 hover:text-brass">← Cases</a>
      <h1 class="text-xl font-semibold text-deep mt-2">${c.title} <span class="ml-1">${diffPill(c.difficulty)}</span></h1>
      <div class="mt-4 bg-white border border-slate-200 rounded-lg p-5">${md(c.scenario_md)}</div>
      <div id="steps" class="mt-4 space-y-2"></div>
      <button onclick="revealStep()" class="mt-4 bg-deep text-white text-sm rounded-md px-4 py-2 hover:bg-brass transition-colors">
        Reveal next step
      </button>`;
  },


  async training() {
    const [notes, items] = await Promise.all([api('/training'), api('/items')]);
    const titleOf = id => (items.find(i => i.id === id) || {}).title || id;
    const modules = [...new Set(notes.map(n => n.module))];
    return `
      <h1 class="text-xl font-semibold text-deep mb-4">Training modules</h1>
      <div class="space-y-8">
        ${modules.map(m => `
          <section>
            <h2 class="font-medium text-deep border-b border-slate-200 pb-1 mb-3">${m}</h2>
            <div class="space-y-3">
              ${notes.filter(n => n.module === m).map(n => `
                <article class="bg-white border border-slate-200 rounded-lg p-5">
                  <p class="font-mono text-brass text-xs">lesson ${n.order}</p>
                  <h3 class="font-medium text-deep mt-0.5">${n.title}</h3>
                  <div class="text-sm leading-relaxed mt-2">${md(n.body_md)}</div>
                  ${n.related_item_ids.length ? `
                    <p class="text-xs text-slate-400 mt-3">Related reference:
                      ${n.related_item_ids.map(id =>
                        `<a href="#/item/${id}" class="text-brass hover:underline">${titleOf(id)}</a>`
                      ).join(' · ')}
                    </p>` : ''}
                </article>`).join('')}
            </div>
          </section>`).join('')}
      </div>`;
  },

  async quiz() {
    const qs = await api('/quiz');
    window._quiz = qs;
    return `
      <h1 class="text-xl font-semibold text-deep mb-4">Quiz</h1>
      <form id="quiz-form" class="space-y-5">
        ${qs.map((q, n) => `
          <fieldset class="bg-white border border-slate-200 rounded-lg p-4" data-qid="${q.id}">
            <legend class="sr-only">Question ${n + 1}</legend>
            <p class="font-medium text-deep mb-2">${n + 1}. ${q.question}</p>
            ${q.options.map((o, idx) => `
              <label class="flex items-center gap-2 text-sm py-1 cursor-pointer">
                <input type="radio" name="${q.id}" value="${idx}" class="accent-brass"> ${o}
              </label>`).join('')}
            <p class="result text-sm mt-2"></p>
          </fieldset>`).join('')}
      </form>
      <button onclick="submitQuiz()" class="mt-5 bg-deep text-white text-sm rounded-md px-4 py-2 hover:bg-brass transition-colors">
        Check answers
      </button>
      <p id="quiz-score" class="mt-3 font-medium text-deep"></p>`;
  },
};

// -------------- Interactions --------------
let stepIdx = 0;
function revealStep() {
  const c = window._case, box = document.getElementById('steps');
  if (stepIdx < c.guided_steps.length) {
    box.insertAdjacentHTML('beforeend',
      `<div class="border-l-2 border-brass bg-white rounded-r-lg px-4 py-2 text-sm">
        <span class="font-mono text-brass text-xs">step ${stepIdx + 1}</span> — ${c.guided_steps[stepIdx]}</div>`);
    stepIdx++;
  } else {
    box.insertAdjacentHTML('beforeend',
      `<div class="bg-deep text-white rounded-lg px-4 py-3 text-sm">${md(c.expected_outcome_md)}</div>`);
    event.target.remove();
  }
}

async function submitQuiz() {
  const answers = {};
  for (const q of window._quiz) {
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
    if (!sel) { alert('Answer every question first.'); return; }
    answers[q.id] = Number(sel.value);
  }
  const res = await fetch('/api/v1/quiz/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers }),
  }).then(r => r.json());
  for (const r of res.results) {
    const fs = document.querySelector(`fieldset[data-qid="${r.question_id}"]`);
    const p = fs.querySelector('.result');
    p.innerHTML = r.correct
      ? `<span class="text-green-700">✔ Correct.</span> ${r.explanation}`
      : `<span class="text-red-700">✘ Not quite.</span> ${r.explanation}`;
  }
  document.getElementById('quiz-score').textContent = `Score: ${res.score} / ${res.total}`;
}

function wireSearch() {
  const box = document.getElementById('search');
  if (!box) return;
  let t;
  box.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(async () => {
      const out = document.getElementById('search-results');
      if (!box.value.trim()) { out.innerHTML = ''; return; }
      const items = await api('/items?q=' + encodeURIComponent(box.value.trim()));
      out.innerHTML = items.length
        ? `<div class="mb-6 space-y-2">${items.map(i => card(
            `<a href="#/item/${i.id}" class="font-medium text-deep">${i.title}</a>
             <p class="text-sm text-slate-500">${i.summary}</p>`)).join('')}</div>`
        : `<p class="text-sm text-slate-400 mb-6">No items match "${esc(box.value)}". Try a tag like "star" or "instrument".</p>`;
    }, 200);
  });
}

// -------------- Router --------------
async function route() {
  stepIdx = 0;
  const app = document.getElementById('app');
  const hash = location.hash || '#/';
  const [, view, param] = hash.split('/');
  try {
    if (!view)                 app.innerHTML = await views.home();
    else if (view === 'categories') { app.innerHTML = await views.categories(); wireSearch(); }
    else if (view === 'item')  app.innerHTML = await views.item(param);
    else if (view === 'cases') app.innerHTML = await views.cases();
    else if (view === 'case')  app.innerHTML = await views.case(param);
    else if (view === 'training') app.innerHTML = await views.training();
    else if (view === 'quiz')  app.innerHTML = await views.quiz();
    else app.innerHTML = '<p class="text-slate-500">Page not found. <a class="text-brass" href="#/">Go home</a>.</p>';
  } catch (e) {
    app.innerHTML = `<p class="text-red-700 text-sm">Could not load data (${e.message}). Is the API running?</p>`;
  }
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
