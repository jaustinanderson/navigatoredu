<style>
  /* Visible keyboard focus everywhere, without adding noise for mouse users. */
  :focus-visible { outline: 2px solid #8a6420; outline-offset: 2px; border-radius: 4px; }

  /* Facet chips (tag + difficulty filters) are a small explicit CSS
     component. Every visual property is set here, statically, in every
     state — rest, hover, focus, selected — so chip rendering cannot depend
     on runtime-generated utility classes or their relative order in the
     stylesheet. Selection state is keyed off aria-pressed, which paint()
     already maintains for accessibility. */
  .facet-chip {
    display: inline-flex;
    align-items: center;
    min-height: 1.65rem;
    padding: 0.25rem 0.75rem;
    border: 1px solid #cbd5e1;          /* slate-300 */
    border-radius: 9999px;
    background-color: #ffffff;
    color: #475569;                     /* slate-600 */
    opacity: 1;
    font-size: 0.75rem;
    line-height: 1rem;
    cursor: pointer;
    transition: color .15s, background-color .15s, border-color .15s;
  }
  .facet-chip--mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .facet-chip:hover {
    border-color: #b98a2f;              /* brass */
    color: #8a6420;                     /* brassink */
  }
  .facet-chip:focus-visible {
    border-color: #b98a2f;
    color: #8a6420;
  }
  .facet-chip[aria-pressed="true"],
  .facet-chip[aria-pressed="true"]:hover,
  .facet-chip[aria-pressed="true"]:focus-visible {
    background-color: #12314f;          /* deep */
    border-color: #12314f;
    color: #ffffff;
  }
  @media (prefers-reduced-motion: reduce) { .facet-chip { transition: none; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>

<script>
const api = (path) => fetch('/api/v1' + path).then(r => {
  if (!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
});

// --- Minimal markdown renderer (headers, bold, italics, lists, paragraphs) ---
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function md(src, base = 2){
  const lines = esc(src).split('\n');
  let html = '', inList = false, inOl = false;
  // Heading levels are normalized: the shallowest heading in the block maps
  // to `base` (one level below the enclosing page/section heading), deeper
  // ones follow relatively. Content authors can use #/##/### naturally and
  // the rendered document never skips a level (axe `heading-order`).
  let minH = Infinity;
  for (const line of lines) {
    const m = line.match(/^(#{1,3})\s/);
    if (m) minH = Math.min(minH, m[1].length);
  }
  const inline = t => t
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
  for (const line of lines) {
    const h = line.match(/^(#{1,3})\s+(.*)/);
    const ul = line.match(/^-\s+(.*)/);
    const ol = line.match(/^\d+\.\s+(.*)/);
    if (!ul && inList) { html += '</ul>'; inList = false; }
    if (!ol && inOl)   { html += '</ol>'; inOl = false; }
    if (h) { const lvl = Math.min(6, base + h[1].length - minH);
             html += `<h${lvl} class="font-semibold text-deep mt-4 mb-1">${inline(h[2])}</h${lvl}>`; }
    else if (ul) { if(!inList){html+='<ul class="list-disc ml-5 space-y-1">';inList=true;} html += `<li>${inline(ul[1])}</li>`; }
    else if (ol) { if(!inOl){html+='<ol class="list-decimal ml-5 space-y-1">';inOl=true;} html += `<li>${inline(ol[1])}</li>`; }
    else if (line.trim()) html += `<p class="my-2">${inline(line)}</p>`;
  }
  if (inList) html += '</ul>';
  if (inOl) html += '</ol>';
  return html;
}

// -------------- Small shared pieces --------------
// Plain-text preview of a markdown field: strip simple markers, then truncate.
// Runs on already-plain text, so no HTML is involved (esc() happens at render).
function plainPreview(src, max = 140) {
  const text = src
    .replace(/^#{1,3}\s+/gm, '')        // headings
    .replace(/\*\*(.+?)\*\*/g, '$1')     // bold
    .replace(/\*(.+?)\*/g, '$1')         // italics
    .replace(/^[-*]\s+/gm, '')           // list bullets
    .replace(/^\d+\.\s+/gm, '')          // numbered lists
    .replace(/\s+/g, ' ')
    .trim();
  return text.length > max ? esc(text.slice(0, max)) + '…' : esc(text);
}

// Tags come from pack JSON: keep only non-empty trimmed strings, dedupe
// case-insensitively (first spelling wins). Rendering blank or duplicate
// chips is a data bug surfacing in the UI — normalize once, everywhere.
function normalizeTags(tags) {
  const seen = new Set(), out = [];
  for (const raw of tags || []) {
    if (typeof raw !== 'string') continue;
    const t = raw.trim();
    if (!t) continue;
    const key = t.toLowerCase();
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(t);
  }
  return out;
}

const tagPill  = t => `<span class="text-[11px] font-mono bg-slate-100 text-slate-600 rounded px-1.5 py-0.5">${esc(t)}</span>`;
const diffPill = d => `<span class="text-[11px] uppercase tracking-wide font-medium text-brassink">${d}</span>`;
const synthPill = () =>
  `<span class="inline-flex items-center gap-1 text-[11px] uppercase tracking-wide font-medium bg-slate-100 text-slate-600 rounded-full px-2 py-0.5">
     <span class="w-1.5 h-1.5 rounded-full bg-brass" aria-hidden="true"></span>Synthetic
   </span>`;

// A card whose whole surface is one click target (single primary link inside).
const linkCard = (href, inner, label) => `
  <a href="${href}" aria-label="${label}"
     class="block bg-white border border-slate-200 rounded-lg p-4 hover:border-brass hover:shadow-sm transition-all">
    ${inner}
  </a>`;

const loadingView = () => `
  <div class="py-16 text-center" role="status">
    <p class="text-sm text-slate-600">Loading…</p>
  </div>`;

const emptyState = (what, hint) => `
  <div class="bg-white border border-dashed border-slate-300 rounded-lg px-6 py-10 text-center">
    <p class="text-sm text-slate-600">${what}</p>
    ${hint ? `<p class="text-xs text-slate-600 mt-1.5">${hint}</p>` : ''}
  </div>`;

const errorView = (e) => `
  <div class="bg-white border border-red-200 rounded-lg px-6 py-8 text-center">
    <p class="text-sm font-medium text-red-800">Could not load data (${esc(e.message)}).</p>
    <p class="text-xs text-slate-600 mt-1.5">
      Check that the API is running, then
      <a href="${location.hash || '#/'}" onclick="route()" class="text-brassink underline">try again</a>.
    </p>
  </div>`;

// -------------- The pack manifest card (home-page signature element) --------------
function manifestCard(meta) {
  const row = (label, value) => `
    <div class="grid sm:grid-cols-[8.5rem_1fr] gap-x-4 gap-y-0.5 py-2.5 border-t border-slate-100">
      <dt class="text-[11px] uppercase tracking-wide text-slate-600 pt-0.5">${label}</dt>
      <dd class="text-sm text-ink leading-relaxed">${esc(value)}</dd>
    </div>`;
  return `
    <section aria-label="Active content pack" class="bg-white border border-slate-200 rounded-lg overflow-hidden">
      <div class="px-5 pt-4 pb-3">
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <p class="text-[11px] uppercase tracking-wide text-brassink">Active content pack</p>
            <h2 class="font-display font-semibold text-xl text-deep mt-0.5">${esc(meta.pack_name)}</h2>
          </div>
          ${synthPill()}
        </div>
        <p class="text-sm text-slate-600 mt-1.5">${esc(meta.pack_description)}</p>
        <p class="font-mono text-[11px] text-slate-600 mt-2">
          ${esc(meta.pack_id)} · v${esc(meta.pack_version)}${meta.domain_type ? ' · ' + esc(meta.domain_type) : ''}
        </p>
      </div>
      <dl class="px-5 pb-4">
        ${row('Intended use', meta.intended_use)}
        ${row('Safety notes', meta.safety_notes)}
      </dl>
    </section>`;
}

// ---------------- Views ----------------
const views = {

  async home() {
    const [cats, meta] = await Promise.all([api('/categories'), api('/pack-metadata')]);

    const step = (n, href, title, desc, notice) => `
      <li class="flex gap-3">
        <span class="flex-none w-6 h-6 rounded-full bg-deep text-white text-xs flex items-center justify-center font-mono" aria-hidden="true">${n}</span>
        <div class="text-sm leading-relaxed">
          <p class="text-slate-700">
            <a href="${href}" class="font-medium text-deep hover:text-brassink underline decoration-slate-300 underline-offset-2">${title}</a>
            — ${desc}
          </p>
          <p class="text-slate-600 mt-0.5"><span class="text-[11px] uppercase tracking-wide text-brassink">Notice:</span> ${notice}</p>
        </div>
      </li>`;

    const demoCard = (title, desc) => `
      <div class="bg-white border border-slate-200 rounded-lg p-4">
        <p class="font-medium text-deep text-sm">${title}</p>
        <p class="text-sm text-slate-600 mt-1 leading-relaxed">${desc}</p>
      </div>`;

    return `
      <!-- Hero -->
      <section aria-label="Introduction">
        <h1 class="font-display font-bold text-3xl text-deep tracking-tight">NavigatorEdu</h1>
        <p class="text-lg text-slate-700 mt-2 max-w-2xl leading-relaxed">
          A local-demo education platform where the entire knowledge domain is
          supplied by a validated JSON content pack — the same app serves
          different domains without changing backend or frontend code.
        </p>
        <div class="flex flex-wrap gap-2.5 mt-5">
          <button onclick="document.getElementById('walkthrough')?.scrollIntoView({behavior:'smooth'})"
            class="bg-deep text-white text-sm font-medium rounded-md px-4 py-2 hover:bg-brassink transition-colors">
            Start reviewer walkthrough
          </button>
          <a href="#/packs"
            class="border border-deep text-deep text-sm font-medium rounded-md px-4 py-2 hover:border-brassink hover:text-brassink transition-colors">
            Browse content packs
          </a>
          <a href="/docs"
            class="text-sm font-medium text-slate-600 rounded-md px-4 py-2 hover:text-brassink transition-colors">
            View API docs ↗
          </a>
        </div>
      </section>

      <!-- What / why / how to evaluate -->
      <section aria-label="About this project" class="mt-8 max-w-2xl">
        <p class="text-sm text-slate-600 leading-relaxed">
          Content-driven systems usually treat content as an afterthought —
          unvalidated, unversioned, coupled to code. NavigatorEdu demonstrates
          the opposite: a <strong class="text-deep">content pack</strong> is one
          JSON file holding an entire domain (reference items, training
          lessons, practice cases, quiz questions, disclaimers, and governance
          metadata), checked by a validator before it can be seeded. Because
          the code encodes structure rather than content, swapping the pack
          re-skins the whole product — and the pack is held to the same
          contract discipline as code. Every record in every pack is fictional
          and synthetic.
        </p>
        <p class="text-sm text-slate-600 leading-relaxed mt-3">
          <span class="text-[11px] uppercase tracking-wide text-brassink">How to evaluate this app:</span>
          follow the walkthrough below — the moment to judge is the pack
          switch, where the entire visible domain changes and the governance
          banner follows. Then skim the API docs and the repo's tests.
        </p>
      </section>

      <div class="mt-8">${manifestCard(meta)}</div>

      <!-- Reviewer walkthrough -->
      <section aria-label="Reviewer walkthrough" id="walkthrough" class="mt-10 scroll-mt-20">
        <h2 class="font-display font-semibold text-lg text-deep">Reviewer walkthrough</h2>
        <p class="text-sm text-slate-600 mt-0.5 mb-4">The 60-second demo path, in order:</p>
        <ol class="space-y-4">
          ${step(1, '#/packs', 'Open Packs',
            'the bundled, allowlisted demo packs with their governance metadata.',
            'each pack declares its intended use, safety notes, and synthetic-only status — and exactly one is marked Active.')}
          ${step(2, '#/packs', 'Load a different pack',
            'one click reseeds the local demo database.',
            'the top banner and active-pack card change immediately; the database now holds only the selected pack.')}
          ${step(3, '#/categories', 'Browse the Reference',
            `searchable, categorized items — currently ${cats.length} categories.`,
            'the domain has completely changed, with zero code changes. This is the content-pack architecture working.')}
          ${step(4, '#/cases', 'Open a practice case',
            'guided steps reveal one at a time, ending in the expected outcome.',
            'answer material is fetched on demand — list endpoints deliberately omit it.')}
          ${step(5, '#/quiz', 'Take the quiz',
            'multiple-choice with explanations after checking.',
            'scoring happens server-side; correct answers never appear in the page source before submission.')}
          ${step(6, '/docs', 'Inspect the API docs',
            'the same data over a versioned REST API.',
            'OpenAPI documentation generated from the code — the frontend is just one consumer of this API.')}
        </ol>
      </section>

      <!-- What this demonstrates -->
      <section aria-label="What this demonstrates" class="mt-10">
        <h2 class="font-display font-semibold text-lg text-deep mb-3">What this demonstrates</h2>
        <div class="grid sm:grid-cols-2 gap-3">
          ${demoCard('Swappable content-pack architecture',
            'Three complete domains run on one codebase; the models, routes, and UI encode structure, not content.')}
          ${demoCard('Allowlisted local-demo pack loading',
            'The Packs selector loads bundled packs only — no uploads, no arbitrary paths, no filesystem exposure.')}
          ${demoCard('JSON validation before seeding',
            'A validator enforces structure, references, quiz sanity, and required governance metadata — in CI, on every push.')}
          ${demoCard('Server-scored quiz',
            'Answers are stripped from GET responses and graded server-side, so the page source never leaks them.')}
          ${demoCard('Synthetic data safety boundaries',
            'Every pack must declare synthetic_only, intended use, and safety notes; the CytoFISH pack models a sensitive domain with those boundaries in the content itself.')}
          ${demoCard('CI-tested backend behavior',
            'A pytest suite runs real queries against isolated databases — no mocks — plus pack validation on every push.')}
          ${demoCard('Portfolio-grade documentation',
            'Architecture notes, authoring guide, demo guide, case study, and screenshots ship with the code.')}
        </div>
      </section>

      <!-- Intentionally out of scope -->
      <section aria-label="Intentionally out of scope" class="mt-10">
        <h2 class="font-display font-semibold text-lg text-deep mb-3">Intentionally out of scope</h2>
        <div class="bg-white border border-slate-200 rounded-lg p-5">
          <p class="text-sm text-slate-600 leading-relaxed">
            Scope control is part of the design. This demo deliberately
            excludes anything it could not do responsibly at this scale:
          </p>
          <ul class="grid sm:grid-cols-2 gap-x-6 gap-y-1.5 mt-3 text-sm text-slate-600">
            <li>· No real clinical use or claims</li>
            <li>· No PHI, ever</li>
            <li>· No real patient cases</li>
            <li>· No diagnostic language</li>
            <li>· No arbitrary file uploads</li>
            <li>· No arbitrary filesystem loading</li>
            <li>· No authentication or admin complexity</li>
            <li>· No AI/RAG features</li>
          </ul>
          <p class="text-sm text-slate-600 leading-relaxed mt-3">
            Each exclusion keeps the demo honest: safety boundaries are
            enforced mechanically (validator + allowlist), and nothing ships
            that can't be validated.
          </p>
        </div>
      </section>

      <!-- Tech stack -->
      <section aria-label="Tech stack" class="mt-10 mb-2">
        <h2 class="font-display font-semibold text-lg text-deep mb-3">Tech stack</h2>
        <div class="flex flex-wrap gap-1.5">
          ${['FastAPI', 'SQLModel / SQLite', 'Vanilla HTML/CSS/JavaScript', 'Pytest', 'GitHub Actions', 'JSON content packs']
            .map(t => `<span class="text-xs font-mono bg-white border border-slate-200 text-slate-600 rounded-full px-3 py-1">${t}</span>`).join('')}
        </div>
      </section>`;
  },

  async categories() {
    const [cats, items] = await Promise.all([api('/categories'), api('/items')]);
    const byCat = id => items.filter(i => i.category_id === id);
    if (!cats.length) return `
      <h1 class="font-display font-semibold text-2xl text-deep mb-4">Reference</h1>
      ${emptyState('No categories in the active content pack yet.',
                   'Seed a pack with <code>python -m backend.app.seed</code>, then reload.')}`;
    const chip = (label, target) => `
      <button data-filter="${target}"
        class="filter-chip text-xs rounded-full border border-slate-300 bg-white px-3 py-1 text-slate-600 hover:border-brass hover:text-brassink transition-colors"
        aria-pressed="false">${label}</button>`;
    return `
      <h1 class="font-display font-semibold text-2xl text-deep">Reference</h1>
      <p class="text-sm text-slate-600 mt-0.5 mb-4">Search across every item, or filter by category.</p>

      <label for="search" class="sr-only">Search reference items</label>
      <input id="search" type="search" placeholder="Search titles, summaries, body text, and tags…"
        class="w-full border border-slate-300 rounded-md px-3 py-2 mb-3 text-sm bg-white placeholder:text-slate-600 focus:outline-none focus:border-brass"/>

      ${(() => {
        // Difficulty row: normalized, blanks dropped; row hidden if empty.
        const diffs = [...new Set(items.map(i => (typeof i.difficulty === 'string' ? i.difficulty.trim() : '')))]
          .filter(Boolean).sort();
        if (!diffs.length) return '';
        return `<div class="flex flex-wrap items-center gap-1.5 mb-1.5" role="group" aria-label="Filter by difficulty">
          <span class="text-[11px] uppercase tracking-wide text-slate-600 mr-0.5">Difficulty</span>
          ${diffs.map(d => `<button data-difficulty="${esc(d)}" class="facet-chip" aria-pressed="false">${esc(d)}</button>`).join('')}
        </div>`;
      })()}
      ${(() => {
        // Tag row: normalizeTags trims, drops empty/whitespace, dedupes
        // case-insensitively. Row hidden entirely if no usable tags — no
        // placeholder pills. The visible label lives in the button body.
        const freq = {};
        items.forEach(i => normalizeTags(i.tags).forEach(t => {
          const key = t.toLowerCase();
          freq[key] = freq[key] ? { n: freq[key].n + 1, label: freq[key].label } : { n: 1, label: t };
        }));
        const top = Object.keys(freq).sort((a, b) => freq[b].n - freq[a].n).slice(0, 12);
        if (!top.length) return '';
        return `<div class="flex flex-wrap items-center gap-1.5 mb-2" role="group" aria-label="Filter by tag">
          <span class="text-[11px] uppercase tracking-wide text-slate-600 mr-0.5">Tags</span>
          ${top.map(k => `<button data-tag="${esc(freq[k].label)}" class="facet-chip facet-chip--mono" aria-pressed="false">${esc(freq[k].label)}</button>`).join('')}
        </div>`;
      })()}
      <div id="active-filters" class="mb-3"></div>
      <div id="search-results"></div>

      <div class="flex flex-wrap gap-1.5 mb-6" role="group" aria-label="Filter by category">
        ${chip('All categories', 'all')}
        ${cats.map(c => chip(c.name, c.id)).join('')}
      </div>

      <div class="space-y-8">
        ${cats.map(c => `
          <section data-cat-section="${c.id}">
            <h2 class="font-display font-semibold text-lg text-deep">${c.name}</h2>
            <p class="text-sm text-slate-600 mb-3">${c.description}</p>
            <div class="grid sm:grid-cols-2 gap-3">
              ${byCat(c.id).length ? byCat(c.id).map(i => linkCard('#/item/' + i.id, `
                <p class="font-medium text-deep">${i.title}</p>
                <p class="text-sm text-slate-600 mt-1">${i.summary}</p>
                <div class="flex flex-wrap gap-1.5 mt-2.5 items-center">${diffPill(i.difficulty)} ${normalizeTags(i.tags).map(tagPill).join('')}</div>
              `, i.title)).join('')
              : `<p class="text-sm text-slate-600 sm:col-span-2">No items in this category yet.</p>`}
            </div>
          </section>`).join('')}
      </div>`;
  },

  async item(id) {
    const i = await api('/items/' + id);
    return `
      <nav aria-label="Breadcrumb" class="text-sm">
        <a href="#/categories" class="text-slate-600 hover:text-brassink">← Reference</a>
      </nav>
      <h1 class="font-display font-semibold text-2xl text-deep mt-3">${i.title}</h1>

    const [notes, items] = await Promise.all([api('/training'), api('/items')]);
    if (!notes.length) return `

              <h2 class="font-display font-semibold text-lg text-deep">${m}</h2>
              <span class="text-xs text-slate-600">${lessons.length} lesson${lessons.length === 1 ? '' : 's'}</span>
            </div>
            <div class="space-y-4">
              ${lessons.map(n => `
                <article class="bg-white border border-slate-200 rounded-lg p-6">
                  <div class="flex items-center gap-2">

                      ).join(' · ')}

                </article>`).join('')}

  async quiz() {
    const qs = await api('/quiz');

    if (!qs.length) return `
      <h1 class="font-display font-semibold text-2xl text-deep mb-4">Quiz</h1>

    return `
      <h1 class="font-display font-semibold text-2xl text-deep">Quiz</h1>

                  <input type="radio" name="${q.id}" value="${idx}" class="accent-[#8a6420]"> ${o}

      </div>
      <div class="mt-4 flex items-center gap-4 flex-wrap">
        <p id="quiz-score" class="font-display font-semibold text-lg text-deep" role="status"></p>

  async packs() {
    const body = await api('/packs');
    const success = window._packJustLoaded
      ? `<div class="mb-6 bg-white border border-green-600 rounded-lg px-5 py-4" role="status">
           <p class="text-sm font-medium text-green-700">✔ Loaded ${esc(window._packJustLoaded)}.</p>
           <p class="text-sm text-slate-600 mt-1">The database now holds only this pack — every section below the banner reflects it.</p>
           <a href="#/categories" class="inline-block mt-3 bg-deep text-white text-sm font-medium rounded-md px-4 py-2 hover:bg-brassink transition-colors">Browse the Reference →</a>
         </div>`

    const packCard = (p) => {
      const active = p.pack_id === body.active_pack_id;

            <div>

              <p class="font-mono text-[11px] text-slate-600 mt-0.5">${esc(p.pack_id)} · v${esc(p.pack_version)} · ${esc(p.domain_type)}</p>
            </div>
            <div class="flex items-center gap-2">
              ${synthPill()}
              ${active ? `<span class="text-[11px] uppercase tracking-wide font-medium bg-deep text-white rounded-full px-2 py-0.5">Active</span>` : ''}
            </div>
          </div>
          <p class="text-sm text-slate-600 mt-1.5">${esc(p.pack_description)}</p>
        </div>
        <dl class="px-5 pb-3">
          <div class="grid sm:grid-cols-[8.5rem_1fr] gap-x-4 py-2 border-t border-slate-100">
            <dt class="text-[11px] uppercase tracking-wide text-slate-600 pt-0.5">Intended use</dt>
            <dd class="text-sm text-ink leading-relaxed">${esc(p.intended_use)}</dd>
          </div>
          <div class="grid sm:grid-cols-[8.5rem_1fr] gap-x-4 py-2 border-t border-slate-100">
            <dt class="text-[11px] uppercase tracking-wide text-slate-600 pt-0.5">Safety notes</dt>
            <dd class="text-sm text-ink leading-relaxed">${esc(p.safety_notes)}</dd>
          </div>
        </dl>
        <div class="px-5 pb-4">
          ${active
            ? `<p class="text-sm text-slate-600">This pack is currently loaded.</p>`
            : `<button onclick="loadPack('${p.slug}', this)" aria-label="Load the ${esc(p.pack_name)} demo pack"
                 class="bg-deep text-white text-sm font-medium rounded-md px-4 py-2 hover:bg-brassink transition-colors">
                 Load demo pack
               </button>`}
        </div>

    };
    return `
      <h1 class="font-display font-semibold text-2xl text-deep">Content packs</h1>
      <p class="text-sm text-slate-600 mt-0.5 mb-6 max-w-2xl leading-relaxed">
        The bundled demo packs. Loading one reseeds the local demo database —
        the same app then serves an entirely different domain, which is the
        point of the content-pack architecture. All packs are synthetic,

      ${success}
      <div class="space-y-4">${body.packs.map(packCard).join('')}</div>

// -------------- Interactions --------------
let stepIdx = 0;
function revealStep(btn) {
  const c = window._case, box = document.getElementById('steps');
  const total = c.guided_steps.length;
  if (stepIdx < total) {
    box.insertAdjacentHTML('beforeend',
      `<div class="border-l-2 border-brass bg-white rounded-r-lg px-4 py-2.5 text-sm">
        <span class="font-mono text-brassink text-xs">Step ${stepIdx + 1} of ${total}</span> — ${c.guided_steps[stepIdx]}</div>`);
    stepIdx++;
    btn.textContent = stepIdx < total
      ? `Reveal step ${stepIdx + 1} of ${total}`
      : 'Reveal expected outcome';
  } else {
    box.insertAdjacentHTML('beforeend',
      `<div class="bg-deep text-white rounded-lg px-5 py-4 text-sm leading-relaxed">
        <p class="text-[11px] uppercase tracking-wide text-white/70 mb-1">Expected outcome</p>${md(c.expected_outcome_md)}</div>`);
    btn.remove();
  }
}

async function submitQuiz() {
  const hint = document.getElementById('quiz-hint');
  hint.textContent = '';
  const answers = {};
  const unanswered = [];
  for (const q of window._quiz) {
    const fs = document.querySelector(`fieldset[data-qid="${q.id}"]`);
    fs.classList.remove('border-red-400');
    const sel = document.querySelector(`input[name="${q.id}"]:checked`);
    if (!sel) { unanswered.push(fs); continue; }
    answers[q.id] = Number(sel.value);
  }
  if (unanswered.length) {
    unanswered.forEach(fs => fs.classList.add('border-red-400'));
    hint.textContent = `${unanswered.length} question${unanswered.length === 1 ? '' : 's'} unanswered — highlighted above.`;
    unanswered[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  const res = await fetch('/api/v1/quiz/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers }),
  }).then(r => r.json());
  for (const r of res.results) {
    const fs = document.querySelector(`fieldset[data-qid="${r.question_id}"]`);
    fs.classList.remove('border-slate-200', 'border-red-400');
    fs.classList.add(r.correct ? 'border-green-600' : 'border-red-400');
    const p = fs.querySelector('.result');
    p.innerHTML = r.correct
      ? `<span class="font-medium text-green-700">✔ Correct.</span> ${r.explanation}`
      : `<span class="font-medium text-red-700">✘ Not quite.</span> ${r.explanation}`;
  }
  document.getElementById('quiz-score').textContent = `Score: ${res.score} / ${res.total}`;
  document.getElementById('quiz-submit').textContent = 'Check again';
  window._lastQuizAnswers = answers;
  document.getElementById('quiz-report-slot').innerHTML = `
    <button onclick="downloadQuizReport(this)"
      class="border border-deep text-deep text-sm font-medium rounded-md px-4 py-2 hover:border-brassink hover:text-brassink transition-colors">
      Download report
    </button>
    <span class="text-xs text-slate-600 ml-1.5">printable HTML · generated locally, not stored</span>`;
}

async function loadPack(slug, btn) {
  btn.disabled = true;
  btn.textContent = 'Loading…';
  try {
    const r = await fetch('/api/v1/packs/select', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug }),
    });
    if (!r.ok) throw new Error(`API ${r.status}`);
    const body = await r.json();
    window._packJustLoaded = body.loaded.pack_name;
    await loadPackBanner();   // refresh the top banner + tab title
    await route();            // re-render the packs view with the success state
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Load demo pack';
    btn.insertAdjacentHTML('afterend',
      `<p class="text-sm text-red-700 mt-2" role="status">Could not load the pack (${esc(e.message)}). Check that the API is running, then try again.</p>`);
  }
}

async function downloadQuizReport(btn) {
  // Same payload as submit; server returns a self-contained printable HTML
  // document generated statelessly from these answers — nothing is stored.
  btn.disabled = true;
  const label = btn.textContent;
  btn.textContent = 'Preparing…';
  try {
    const r = await fetch('/api/v1/quiz/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: window._lastQuizAnswers || {} }),
    });
    if (!r.ok) throw new Error(`API ${r.status}`);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'navigatoredu-quiz-report.html';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    btn.insertAdjacentHTML('afterend',
      `<span class="text-sm text-red-700 ml-2" role="status">Could not generate the report (${esc(e.message)}).</span>`);
  } finally {
    btn.disabled = false;
    btn.textContent = label;
  }
}

function wireSearch() {
  // Combined q + tag + difficulty filtering, all served by GET /items.
  const box = document.getElementById('search');
  if (!box) return;
  const state = { q: '', tag: null, difficulty: null };
  const out = document.getElementById('search-results');
  const activeBar = document.getElementById('active-filters');

  const paint = () => {
    document.querySelectorAll('.facet-chip').forEach(chip => {
      const on = (chip.dataset.tag && chip.dataset.tag === state.tag)
              || (chip.dataset.difficulty && chip.dataset.difficulty === state.difficulty);
      // Selection styling is entirely CSS-driven via [aria-pressed="true"]
      // (see the .facet-chip component in <head>). paint() only updates the
      // accessibility state — no utility-class toggling to conflict.
      chip.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    const parts = [];
    if (state.q.trim()) parts.push(`search: “${esc(state.q.trim())}”`);
    if (state.tag) parts.push(`tag: ${esc(state.tag)}`);
    if (state.difficulty) parts.push(`difficulty: ${esc(state.difficulty)}`);
    activeBar.innerHTML = parts.length
      ? `<span class="text-xs text-slate-600">Active filters — ${parts.join(' · ')}</span>
         <button id="clear-filters" class="text-xs text-brassink underline ml-2">Clear all</button>`
      : '';
    const clear = document.getElementById('clear-filters');
    if (clear) clear.addEventListener('click', () => {
      state.q = ''; state.tag = null; state.difficulty = null;
      box.value = '';
      refresh();
    });
  };

  const refresh = async () => {
    paint();
    if (!state.q.trim() && !state.tag && !state.difficulty) { out.innerHTML = ''; return; }
    const params = new URLSearchParams();
    if (state.q.trim()) params.set('q', state.q.trim());
    if (state.tag) params.set('tag', state.tag);
    if (state.difficulty) params.set('difficulty', state.difficulty);
    const results = await api('/items?' + params.toString());
    out.innerHTML = results.length
      ? `<p class="text-xs text-slate-600 mb-2">${results.length} result${results.length === 1 ? '' : 's'}:</p>
         <div class="mb-6 space-y-2">${results.map(i => linkCard('#/item/' + i.id,
          `<p class="font-medium text-deep">${i.title}</p>
           <p class="text-sm text-slate-600 mt-0.5">${i.summary}</p>
           <div class="flex flex-wrap gap-1.5 mt-2 items-center">${diffPill(i.difficulty)} ${normalizeTags(i.tags).map(tagPill).join('')}</div>`, i.title)).join('')}</div>`
      : `<div class="mb-6">${emptyState('No items match the active filters.',
           'Try clearing a filter, or a shorter search term.')}</div>`;
  };

  let t;
  box.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(() => { state.q = box.value; refresh(); }, 200);
  });
  document.querySelectorAll('.facet-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.dataset.tag) state.tag = state.tag === chip.dataset.tag ? null : chip.dataset.tag;
      if (chip.dataset.difficulty) state.difficulty = state.difficulty === chip.dataset.difficulty ? null : chip.dataset.difficulty;
      refresh();
    });
  });
  paint();
}

function wireFilters() {
  const chips = document.querySelectorAll('.filter-chip');
  if (!chips.length) return;
  const activate = (chip) => {
    chips.forEach(c => {
      const on = c === chip;
      c.setAttribute('aria-pressed', on);
      c.classList.toggle('bg-deep', on);
      c.classList.toggle('text-white', on);
      c.classList.toggle('border-deep', on);
      c.classList.toggle('bg-white', !on);
      c.classList.toggle('text-slate-600', !on);
      c.classList.toggle('border-slate-300', !on);
    });
    const target = chip.dataset.filter;
    document.querySelectorAll('[data-cat-section]').forEach(sec => {
      sec.style.display = (target === 'all' || sec.dataset.catSection === target) ? '' : 'none';
    });
  };
  chips.forEach(chip => chip.addEventListener('click', () => activate(chip)));
  activate(chips[0]); // default: all categories
}

// -------------- Router --------------
function markActiveNav(view) {
  const key = { '': 'home', item: 'categories', case: 'cases' }[view] ?? view;
  document.querySelectorAll('[data-nav]').forEach(a => {
    const on = a.dataset.nav === key && key !== 'home';
    a.classList.toggle('border-brass', on);
    a.classList.toggle('text-deep', on);
    a.classList.toggle('font-medium', on);
    a.classList.toggle('border-transparent', !on);
  });
}

async function route() {
  stepIdx = 0;
  const app = document.getElementById('app');
  const hash = location.hash || '#/';
  const [, view, param] = hash.split('/');
  markActiveNav(view || '');
  app.innerHTML = loadingView();
  try {
    if (!view)                 app.innerHTML = await views.home();
    else if (view === 'categories') { app.innerHTML = await views.categories(); wireSearch(); wireFilters(); }
    else if (view === 'item')  app.innerHTML = await views.item(param);
    else if (view === 'cases') app.innerHTML = await views.cases();
    else if (view === 'case')  app.innerHTML = await views.case(param);
    else if (view === 'training') app.innerHTML = await views.training();
    else if (view === 'quiz')  app.innerHTML = await views.quiz();
    else if (view === 'packs') app.innerHTML = await views.packs();
    else app.innerHTML = `
      <div class="py-16 text-center">
        <p class="text-slate-600">Page not found.</p>
        <a class="text-brassink underline text-sm" href="#/">Back to the home page</a>
      </div>`;
  } catch (e) {
    app.innerHTML = errorView(e);
  }
  window.scrollTo(0, 0);
}

// Populate the persistent top banner and tab title with the active pack (runs once).
async function loadPackBanner() {
  try {
    const meta = await api('/pack-metadata');
    const el = document.getElementById('pack-banner');
    if (el) {
      el.textContent =
        `Active content pack: ${meta.pack_name} — synthetic demo only. Not for real-world use.`;
    }
    document.title = `NavigatorEdu — ${meta.pack_name} (demo)`;
  } catch { /* leave the static fallback text in place */ }
}

window.addEventListener('hashchange', route);
loadPackBanner();
route();
</script>
