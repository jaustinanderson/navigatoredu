name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v

      - name: Validate content packs
        run: |
          python -m backend.app.validate_pack data/seed.json
          python -m backend.app.validate_pack data/seed_archiveguild.json
          python -m backend.app.validate_pack data/seed_cytofish_synthetic.json

  docker-build:
    # Build check only: proves the image packages from a clean checkout.
    # Deliberately no push, no registry, no secrets, no deployment.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t navigatoredu:ci .

      - name: Smoke-test the image
        run: |
          docker run -d --rm -p 8000:8000 --name navsmoke navigatoredu:ci
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8000/api/v1/categories > /dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/v1/pack-metadata
          docker stop navsmoke

  browser-test:
    # Playwright browser tests: the UI-behavior layer pytest can't see
    # (computed chip styles, filter interaction, downloads), the axe-core
    # accessibility audit of Home/Reference/Packs/Quiz (fails on serious or
    # critical violations), and the keyboard-only journeys proving the main
    # tasks complete without a mouse. Runs alongside test and docker-build;
    # deploys nothing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python development dependencies
        run: pip install -r requirements-dev.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        # playwright.config.js starts the app itself (webServer) after
        # reseeding a fresh demo database.
        run: npm run test:browser
